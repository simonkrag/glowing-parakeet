<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Modtagekontrol">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMWExYTFhIi8+PHRleHQgeD0iOTAiIHk9IjEwNSIgZm9udC1zaXplPSI4MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI2M0YTM1YSI+4pyTPC90ZXh0Pjwvc3ZnPg==">
<title>Modtagekontrol - GRUMS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap');

:root {
  --bg: #0a0a0a; --fg: #e8e4df; --accent: #c4a35a; --card: #161616;
  --border: #2a2a2a; --muted: #777; --danger: #f87171; --success: #4ade80;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: light) {
  :root { --bg: #f5f2ed; --fg: #1a1a1a; --accent: #8b6914; --card: #fff; --border: #ddd; --muted: #888; }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--fg);
  min-height: 100vh; min-height: 100dvh;
  padding: calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
  -webkit-font-smoothing: antialiased;
}
h1 { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 2px; }
.subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 14px; }
.btn {
  background: var(--accent); color: #0a0a0a; border: none; padding: 14px 24px; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .15s; -webkit-appearance: none; text-decoration: none;
}
.btn:active { opacity: .7; }
.btn:disabled { opacity: .35; }
.btn-outline { background: transparent; color: var(--fg); border: 1px solid var(--border); }
.btn-green { background: #16a34a; color: white; }
.btn-sm { padding: 10px 16px; font-size: 13px; margin-top: 10px; }

.upload-zone {
  border: 2px dashed var(--border); border-radius: 14px; padding: 44px 20px;
  text-align: center; cursor: pointer; transition: border-color .2s;
}
.upload-zone:active { border-color: var(--accent); }
.upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
.upload-zone .label { font-weight: 600; font-size: 15px; }

.ingredient-highlight {
  background: var(--bg); border-radius: 10px; padding: 14px; margin-bottom: 14px;
}
.ingredient-highlight .meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.ingredient-highlight .name { font-size: 20px; font-weight: 700; }
.ingredient-highlight .qty { font-size: 14px; color: var(--muted); margin-top: 2px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border); color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.mono { font-family: 'SF Mono', 'Courier New', monospace; font-size: 12px; }

.pill { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.pill-done { background: #1a3a1a; color: #4ade80; }
.pill-wait { background: #3a2a0a; color: var(--accent); }
.pill-active { background: #0a2a3a; color: #60a5fa; }
@media (prefers-color-scheme: light) {
  .pill-done { background: #dcfce7; color: #166534; }
  .pill-wait { background: #fef3c7; color: #92400e; }
  .pill-active { background: #dbeafe; color: #1e40af; }
}

.alert { border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; }
.alert-error { background: #3a1a1a; border: 1px solid #6b2020; color: var(--danger); }
.alert-success { background: #1a3a1a; border: 1px solid #166534; color: var(--success); }
@media (prefers-color-scheme: light) {
  .alert-error { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }
  .alert-success { background: #dcfce7; border-color: #86efac; color: #166534; }
}

.info-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; font-size: 13px; }
.info-row span { color: var(--muted); }

.loading { text-align: center; padding: 28px; }
.spinner {
  display: inline-block; width: 22px; height: 22px; border: 2.5px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite;
  vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg) } }

.preview { max-width: 100%; max-height: 180px; border-radius: 10px; margin-top: 10px; object-fit: contain; display: block; margin-left: auto; margin-right: auto; }

.counter { font-size: 13px; color: var(--muted); }
.done-icon { font-size: 48px; margin-bottom: 8px; }

input[type="text"], input[type="password"] {
  width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
  background: var(--bg); color: var(--fg); font-family: inherit; font-size: 13px; outline: none;
  -webkit-appearance: none;
}
input[type="text"]:focus, input[type="password"]:focus { border-color: var(--accent); }
input[type="file"] { display: none; }

.flex-row { display: flex; gap: 8px; flex-wrap: wrap; }
.flex-row > * { flex: 1; min-width: 120px; }
</style>
</head>
<body>

<div id="app" style="max-width:480px;margin:0 auto;">
  <h1>Modtagekontrol</h1>
  <p class="subtitle">GRUMS ApS - helsebixen.dk</p>
  <div id="alert-box"></div>
  <div id="view-setup"></div>
  <div id="view-delivery"></div>
  <div id="view-labels"></div>
  <div id="view-done"></div>
</div>

<script>
const SHEET_ID = '1FbZBfFw68-4HysGFlvXdJ1Ar8M7Ha3tJD2Pf0lsJ_-o';
const SCRIPT_URL = 'https://script.google.com/a/macros/grumsaarhus.com/s/AKfycbynRDbn4cBMWhW2BzjFSIfKgESeFXynbzJgnTMCUsrFrstwtvWk52JTx-aVpdr69ixVEw/exec';
const LS_API_KEY = 'grums_api_key';

let state = {
  apiKey: localStorage.getItem(LS_API_KEY) || '',
  deliveryInfo: null,
  ingredients: [],
  currentIdx: 0,
  sheetWritten: false,
};

function $(id) { return document.getElementById(id); }

function showAlert(msg, type) {
  $('alert-box').innerHTML = msg ? `<div class="alert alert-${type}">${msg}</div>` : '';
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res({ data: r.result.split(',')[1], mediaType: file.type });
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

async function callClaude(base64, mediaType, prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'API fejl: ' + res.status);
  }
  const data = await res.json();
  const raw = data.content?.[0]?.text || '';
  return raw.replace(/```json|```/g, '').trim();
}

async function writeToSheet(rows) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ rows })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function hideAll() {
  ['view-setup','view-delivery','view-labels','view-done'].forEach(id => $(id).innerHTML = '');
  showAlert('', '');
}

function showSetup() {
  hideAll();
  $('view-setup').innerHTML = `
    <div class="card">
      <h2 style="font-size:17px;margin-bottom:6px;">Opsætning</h2>
      <p style="color:var(--muted);font-size:12px;margin-bottom:14px;">
        Indtast din Anthropic API-nøgle. Den gemmes kun lokalt på denne enhed.
        Find den på <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--accent);">console.anthropic.com</a>
      </p>
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px;">API-nøgle:</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." value="${state.apiKey}">
      <button class="btn" style="margin-top:12px;" onclick="saveApiKey()">Gem og fortsæt</button>
    </div>`;
}

function saveApiKey() {
  const key = $('api-key-input').value.trim();
  if (!key.startsWith('sk-')) {
    showAlert('API-nøgle skal starte med sk-', 'error');
    return;
  }
  state.apiKey = key;
  localStorage.setItem(LS_API_KEY, key);
  showDelivery();
}

function showDelivery() {
  hideAll();
  $('view-delivery').innerHTML = `
    <div class="card">
      <h2 style="font-size:17px;margin-bottom:6px;">1. Følgeseddel</h2>
      <p style="color:var(--muted);font-size:13px;margin-bottom:14px;">Tag et billede af følgesedlen</p>
      <input type="file" id="file-delivery" accept="image/*" capture="environment" onchange="handleDelivery(this)">
      <div class="upload-zone" id="delivery-zone" onclick="document.getElementById('file-delivery').click()">
        <div class="icon">📄</div>
        <div class="label">Tryk for at tage billede</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="showSetup()">Skift API-nøgle</button>
    </div>`;
}

async function handleDelivery(input) {
  const file = input.files?.[0];
  if (!file) return;
  showAlert('', '');
  const preview = URL.createObjectURL(file);
  $('delivery-zone').innerHTML = `<div class="spinner"></div> Analyserer følgeseddel...<img src="${preview}" class="preview">`;

  try {
    const { data, mediaType } = await fileToBase64(file);
    const prompt = `Du ser en følgeseddel (delivery note/packing list) for ingredienser eller emballage.

Udtræk følgende som JSON (og kun JSON, ingen markdown):
{
  "leverandor": "leverandørens navn",
  "dato": "modtagelsesdato i format DD/MM/YYYY",
  "produkter": [
    {
      "type": "Råvare eller Emballage",
      "produkt": "produktnavn/beskrivelse som det står på følgesedlen",
      "maengde": "antal/mængde som tal"
    }
  ]
}

Regler:
- "type" skal være enten "Råvare" eller "Emballage" baseret på om det er en ingrediens/råvare eller emballage/pakning.
- "produkt" skal inkludere den fulde produktbeskrivelse.
- "maengde" skal kun være tallet, ingen enhed.
- Inkluder alle linjer fra følgesedlen.`;
    const parsed = JSON.parse(await callClaude(data, mediaType, prompt));
    state.deliveryInfo = parsed;
    state.ingredients = parsed.produkter.map(p => ({ ...p, batchnummer: null }));
    state.currentIdx = 0;
    showLabels();
  } catch (err) {
    console.error(err);
    showAlert('Fejl: ' + err.message, 'error');
    showDelivery();
  }
}

function showLabels() {
  hideAll();
  const d = state.deliveryInfo;
  const ing = state.ingredients[state.currentIdx];
  const tableRows = state.ingredients.map((item, i) => {
    const status = item.batchnummer
      ? '<span class="pill pill-done">✓</span>'
      : i === state.currentIdx
        ? '<span class="pill pill-active">aktiv</span>'
        : '<span class="pill pill-wait">venter</span>';
    return `<tr><td>${item.produkt}</td><td class="mono">${item.batchnummer || '-'}</td><td>${status}</td></tr>`;
  }).join('');

  $('view-labels').innerHTML = `
    <div class="card">
      <div class="info-row">
        <div><span>Leverandør:</span> <b>${d.leverandor}</b></div>
        <div><span>Dato:</span> ${d.dato}</div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h2 style="font-size:17px;">2. Scan etiketter</h2>
        <span class="counter">${state.currentIdx + 1} / ${state.ingredients.length}</span>
      </div>
      <div class="ingredient-highlight">
        <div class="meta">Næste produkt:</div>
        <div class="name">${ing.produkt}</div>
        <div class="qty">${ing.type} - ${ing.maengde} stk.</div>
      </div>
      <input type="file" id="file-label" accept="image/*" capture="environment" onchange="handleLabel(this)">
      <div id="label-zone">
        <button class="btn" onclick="document.getElementById('file-label').click()">📸 Tag billede af etiket</button>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table><thead><tr><th>Produkt</th><th>Batch</th><th>Status</th></tr></thead>
      <tbody>${tableRows}</tbody></table>
    </div>`;
}

async function handleLabel(input) {
  const file = input.files?.[0];
  if (!file) return;
  showAlert('', '');
  const name = state.ingredients[state.currentIdx].produkt;
  const preview = URL.createObjectURL(file);
  $('label-zone').innerHTML = `<div class="loading"><span class="spinner"></span> Læser batchnummer...<img src="${preview}" class="preview"></div>`;

  try {
    const { data, mediaType } = await fileToBase64(file);
    const prompt = `Du ser en etiket/label på et produkt: "${name}".
Udtræk batchnummer (batch number / lot number / parti nummer / charge / LOT) fra etiketten.
Svar KUN med JSON (ingen markdown):
{ "batchnummer": "det fundne batchnummer" }`;
    const parsed = JSON.parse(await callClaude(data, mediaType, prompt));
    state.ingredients[state.currentIdx].batchnummer = parsed.batchnummer;

    if (state.currentIdx < state.ingredients.length - 1) {
      state.currentIdx++;
      showLabels();
    } else {
      showDone();
    }
  } catch (err) {
    console.error(err);
    showAlert('Fejl: ' + err.message, 'error');
    showLabels();
  }
}

function showDone() {
  hideAll();
  state.sheetWritten = false;
  const d = state.deliveryInfo;
  const tableRows = state.ingredients.map(i =>
    `<tr><td>${i.type}</td><td>${i.produkt}</td><td>${i.maengde}</td><td class="mono">${i.batchnummer || '-'}</td></tr>`
  ).join('');

  $('view-done').innerHTML = `
    <div class="card" style="text-align:center;">
      <div class="done-icon">✅</div>
      <h2 style="font-size:19px;margin-bottom:4px;">Modtagekontrol afsluttet</h2>
      <p style="color:var(--muted);font-size:13px;">${d.leverandor} - ${d.dato}</p>
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table><thead><tr><th>Type</th><th>Produkt</th><th>Mængde</th><th>Lev. batch</th></tr></thead>
      <tbody>${tableRows}</tbody></table>
    </div>
    <div class="flex-row">
      <button class="btn btn-green" id="btn-sheets" onclick="sendToSheets()">📊 Skriv til Sheets</button>
      <button class="btn btn-outline" onclick="resetApp()">Ny modtagelse</button>
    </div>`;
}

async function sendToSheets() {
  if (state.sheetWritten) return;
  const btn = $('btn-sheets');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Skriver...';
  showAlert('', '');
  try {
    const rows = state.ingredients.map(ing => ({
      dato: state.deliveryInfo?.dato || '',
      type: ing.type || '',
      produkt: ing.produkt || '',
      maengde: ing.maengde || '',
      leverandor: state.deliveryInfo?.leverandor || '',
      batchnummer: ing.batchnummer || ''
    }));
    await writeToSheet(rows);
    state.sheetWritten = true;
    showAlert('Data skrevet til Google Sheets!', 'success');
    btn.outerHTML = `<a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}" target="_blank" rel="noopener"
      class="btn btn-green" style="text-decoration:none;">Åbn Sheet</a>`;
  } catch (err) {
    showAlert('Fejl: ' + err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '📊 Skriv til Sheets';
  }
}

function resetApp() {
  state.deliveryInfo = null;
  state.ingredients = [];
  state.currentIdx = 0;
  state.sheetWritten = false;
  showDelivery();
}

// Init
if (state.apiKey) { showDelivery(); } else { showSetup(); }

// PWA Service Worker
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'grums-v4';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      if (e.request.url.includes('api.anthropic.com') || e.request.url.includes('script.google.com')) return;
      e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

// PWA Manifest
const manifest = {
  name: 'Modtagekontrol - GRUMS',
  short_name: 'Modtagekontrol',
  start_url: '.',
  display: 'standalone',
  background_color: '#0a0a0a',
  theme_color: '#0a0a0a',
  icons: [{
    src: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMWExYTFhIi8+PHRleHQgeD0iOTAiIHk9IjEwNSIgZm9udC1zaXplPSI4MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI2M0YTM1YSI+4pyTPC90ZXh0Pjwvc3ZnPg==',
    sizes: '180x180', type: 'image/svg+xml', purpose: 'any'
  }]
};
const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const mLink = document.createElement('link');
mLink.rel = 'manifest';
mLink.href = URL.createObjectURL(mBlob);
document.head.appendChild(mLink);
</script>
</body>
</html>
